<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armá tu Equipo · La Fondiatta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700;900&family=Roboto:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --carbon: #1E1C1B;
    --tiza: #F2F0EE;
    --beige: #E1D9C8;
    --marron: #9B826A;
    --gris: #ACA496;
    --celeste: #74ACDF;
    --celeste-soft: #9BC1E8;
    --sol: #F6B40E;
    --verde-ok: #4CAF50;
    --rojo: #D64545;
    --shadow: 0 8px 24px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--carbon);
    color: var(--tiza);
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(circle at 20% 10%, rgba(116, 172, 223, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(155, 130, 106, 0.10) 0%, transparent 45%),
      var(--carbon);
    padding: 20px 16px 60px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  /* ---------- HEADER ---------- */
  .header {
    text-align: center;
    padding: 16px 0 28px;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--celeste), transparent);
  }

  .logo {
    width: 110px;
    height: 110px;
    margin: 0 auto 12px;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(116, 172, 223, 0.25));
  }

  .header-title {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 40px);
    letter-spacing: 0.5px;
    line-height: 1;
    text-transform: uppercase;
  }

  .header-title .italic {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    text-transform: none;
    color: var(--celeste);
    letter-spacing: 0;
  }

  .header-sub {
    margin-top: 8px;
    color: var(--gris);
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ---------- PROGRESS BAR ---------- */
  .progress {
    display: flex;
    gap: 6px;
    margin: 0 0 24px;
    padding: 0 4px;
  }

  .progress-dot {
    flex: 1;
    height: 4px;
    background: rgba(242, 240, 238, 0.12);
    border-radius: 2px;
    transition: background .3s;
  }

  .progress-dot.active {
    background: var(--celeste);
  }

  .progress-dot.done {
    background: var(--tiza);
  }

  /* ---------- CARD / STEP ---------- */
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid rgba(242, 240, 238, 0.08);
    border-radius: 18px;
    padding: 28px 24px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(6px);
    animation: fadeIn .4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-num {
    display: inline-block;
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 900;
    color: var(--celeste);
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .step-title {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(24px, 5vw, 32px);
    text-transform: uppercase;
    line-height: 1.05;
    margin-bottom: 6px;
  }

  .step-title .italic {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    text-transform: none;
    color: var(--celeste);
  }

  .step-desc {
    color: var(--gris);
    font-size: 14px;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* ---------- INPUTS ---------- */
  .input-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .input-grid.two { grid-template-columns: repeat(2, 1fr); }

  .input-block {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(242, 240, 238, 0.10);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
    transition: border-color .2s;
  }

  .input-block:focus-within {
    border-color: var(--celeste);
  }

  .input-block label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gris);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .counter {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .counter button {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(242, 240, 238, 0.2);
    background: transparent;
    color: var(--tiza);
    font-size: 18px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .counter button:hover:not(:disabled) {
    background: var(--celeste);
    border-color: var(--celeste);
    color: var(--carbon);
  }

  .counter button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .counter-value {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 22px;
    min-width: 24px;
    text-align: center;
  }

  /* ---------- YES / NO ---------- */
  .yesno {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .yesno-btn {
    padding: 18px;
    border: 2px solid rgba(242, 240, 238, 0.15);
    background: rgba(0,0,0,0.25);
    color: var(--tiza);
    border-radius: 14px;
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all .2s;
  }

  .yesno-btn:hover {
    border-color: var(--celeste);
    background: rgba(116, 172, 223, 0.08);
  }

  .yesno-btn.selected {
    border-color: var(--celeste);
    background: var(--celeste);
    color: var(--carbon);
  }

  .yesno-btn.no.selected {
    border-color: var(--gris);
    background: var(--gris);
    color: var(--carbon);
  }

  /* ---------- OPTIONS ---------- */
  .options-list {
    display: grid;
    gap: 10px;
    margin-bottom: 12px;
  }

  .option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid rgba(242, 240, 238, 0.12);
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    cursor: pointer;
    transition: all .2s;
    user-select: none;
  }

  .option:hover {
    border-color: var(--celeste-soft);
    background: rgba(116, 172, 223, 0.05);
  }

  .option.selected {
    border-color: var(--celeste);
    background: rgba(116, 172, 223, 0.10);
  }

  .option-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }

  .option-name {
    font-weight: 600;
    font-size: 15px;
  }

  .option-detail {
    font-size: 12px;
    color: var(--gris);
  }

  .option-price {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    color: var(--celeste);
    font-size: 16px;
    white-space: nowrap;
  }

  .option-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(242, 240, 238, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
  }

  .option.selected .option-check {
    background: var(--celeste);
    border-color: var(--celeste);
  }

  .option.selected .option-check::after {
    content: '✓';
    color: var(--carbon);
    font-weight: 900;
    font-size: 13px;
  }

  /* Counter dentro de option (para bebidas con cantidad) */
  .option-counter {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .option-counter button {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(242, 240, 238, 0.25);
    background: transparent;
    color: var(--tiza);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
  }

  .option-counter button:hover {
    background: var(--celeste);
    border-color: var(--celeste);
    color: var(--carbon);
  }

  .option-counter .val {
    min-width: 20px;
    text-align: center;
    font-weight: 700;
  }

  /* Sub-section (Carne tipo, Vino tipo, etc.) */
  .sub-section {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px dashed rgba(242, 240, 238, 0.1);
  }

  .sub-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--celeste);
    margin-bottom: 10px;
    font-weight: 700;
  }

  /* ---------- NAV BUTTONS ---------- */
  .nav {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }

  .btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 900;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-primary {
    background: var(--tiza);
    color: var(--carbon);
  }

  .btn-primary:hover {
    background: var(--celeste);
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: transparent;
    color: var(--gris);
    border: 1px solid rgba(242, 240, 238, 0.15);
    flex: 0 0 auto;
    padding: 16px 20px;
  }

  .btn-secondary:hover {
    color: var(--tiza);
    border-color: var(--tiza);
  }

  .btn-whatsapp {
    background: #25D366;
    color: white;
    padding: 18px;
    font-size: 17px;
  }

  .btn-whatsapp:hover {
    background: #20BD5A;
    transform: translateY(-1px);
  }

  /* ---------- RESUMEN ---------- */
  .summary-section {
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px dashed rgba(242, 240, 238, 0.1);
  }

  .summary-section:last-child {
    border-bottom: none;
  }

  .summary-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .summary-title {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--celeste);
  }

  .summary-edit {
    font-size: 12px;
    color: var(--gris);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  .summary-edit:hover {
    color: var(--celeste);
  }

  .summary-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    gap: 12px;
  }

  .summary-item .name {
    flex: 1;
  }

  .summary-item .price {
    color: var(--gris);
    font-weight: 600;
    white-space: nowrap;
  }

  .summary-total {
    margin-top: 20px;
    padding: 18px;
    background: linear-gradient(135deg, rgba(116, 172, 223, 0.12), rgba(116, 172, 223, 0.04));
    border: 1px solid var(--celeste);
    border-radius: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .summary-total .label {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .summary-total .amount {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--celeste);
  }

  .summary-empty {
    text-align: center;
    color: var(--gris);
    padding: 20px;
    font-style: italic;
  }

  .note-tip {
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(246, 180, 14, 0.08);
    border-left: 3px solid var(--sol);
    border-radius: 8px;
    font-size: 13px;
    color: var(--beige);
    line-height: 1.5;
  }

  .note-tip strong {
    color: var(--sol);
  }

  /* Recomendación de tamaño */
  .recommend-badge {
    display: inline-block;
    background: var(--celeste);
    color: var(--carbon);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    vertical-align: middle;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 32px;
    color: var(--gris);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .footer .italic {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    text-transform: none;
    color: var(--celeste);
    font-size: 14px;
    letter-spacing: 0;
    display: block;
    margin-top: 4px;
  }

  /* Hidden helper */
  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: 16px 12px 40px; }
    .card { padding: 22px 18px; }
    .input-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .input-block { padding: 12px 8px; }
    .counter button { width: 28px; height: 28px; font-size: 16px; }
    .counter-value { font-size: 20px; }
  }
</style>
</head>

  const WHATSAPP_NUMBER = '5491123921455';

  // ============================================================
  // ESTADO
  // ============================================================
  const STEPS = [
    'equipo',     // 0 - cantidad personas
    'picada',     // 1
    'carne',      // 2
    'burger',     // 3
    'sinAlcohol', // 4
    'conAlcohol', // 5
    'postre',     // 6
    'resumen'     // 7

  let currentStep = 0;

  let state = {
    hombres: 0,
    mujeres: 0,
    ninos: 0,
    picada: { incluir: null, tipo: null, tamano: null },
    carne:  { incluir: null, tipo: null, carbon: false },
    burger: { incluir: null, tipo: null },
    sinAlcohol: { incluir: null, items: {} }, // items: { coca: 2, agua: 3 }
    conAlcohol: { incluir: null, cerveza: { incluir: false, unidad: 0, sixpack: 0 }, vino: { incluir: false, tipo: null, cantidad: 0 } },
    postre: { incluir: null, items: {} } // items: { chocotorta: 4, franui: 2 }
  };

  // ============================================================
  // UTILS
  // ============================================================
  function totalPersonas() {
    // Niños cuentan como 0.5 a efectos del cálculo de comida
    return state.hombres + state.mujeres + Math.ceil(state.ninos * 0.5);
  }

  function totalPersonasReal() {
    return state.hombres + state.mujeres + state.ninos;
  }

  function fmtPrice(n) {
    return '$' + n.toLocaleString('es-AR');
  }

  function recomendarTamanoPicada() {
    const p = totalPersonas();
    // Comen 2 = S, Comen 3 = M, Comen 4+ = L
    if (p <= 2) return 'S';
    if (p <= 3) return 'M';
    return 'L';
  }

  function recomendarBurgerCombo() {
    const p = totalPersonasReal();
    if (p <= 4) return 'comboS';
    if (p <= 6) return 'comboM';
    return 'comboXL';
  }

  // ============================================================
  // CÁLCULO DE TOTALES
  // ============================================================
  function calcularItems() {
    const items = [];

    // PICADA
    if (state.picada.incluir && state.picada.tipo && state.picada.tamano) {
      const p = CATALOG.picadas[state.picada.tipo];
      if (p && p[state.picada.tamano]) {
        const sizeLabel = state.picada.tamano === 'S' ? 'Small' : state.picada.tamano === 'M' ? 'Medium' : 'Large';
        items.push({
          category: 'picada',
          name: `${p.name} ${sizeLabel}`,
          qty: 1,
          unitPrice: p[state.picada.tamano],
          total: p[state.picada.tamano]
        });
      }
    }

    // CARNE
    if (state.carne.incluir && state.carne.tipo) {
      const c = CATALOG.asado[state.carne.tipo];
      const personas = totalPersonasReal();
      const totalCarne = c.precioPorPersona * personas;
      items.push({
        category: 'carne',
        name: `${c.name} (para ${personas} personas, ~300g c/u)`,
        qty: personas,
        unitPrice: c.precioPorPersona,
        total: totalCarne,
        note: c.desc
      });
      if (state.carne.carbon) {
        items.push({
          category: 'carne',
          name: CATALOG.carbon.name,
          qty: 1,
          unitPrice: CATALOG.carbon.precio,
          total: CATALOG.carbon.precio
        });
      }
    }

    // BURGER
    if (state.burger.incluir && state.burger.tipo) {
      const b = CATALOG.burgers[state.burger.tipo];
      items.push({
        category: 'burger',
        name: b.name,
        qty: 1,
        unitPrice: b.precio,
        total: b.precio,
        note: b.desc
      });
    }

    // BEBIDAS SIN ALCOHOL
    if (state.sinAlcohol.incluir) {
      Object.entries(state.sinAlcohol.items).forEach(([key, qty]) => {
        if (qty > 0) {
          const item = CATALOG.bebidasSinAlcohol[key];
          items.push({
            category: 'sinAlcohol',
            name: `${item.name} x${qty}`,
            qty: qty,
            unitPrice: item.precio,
            total: item.precio * qty
          });
        }
      });
    }

    // BEBIDAS CON ALCOHOL
    if (state.conAlcohol.incluir) {
      if (state.conAlcohol.cerveza.incluir) {
        if (state.conAlcohol.cerveza.unidad > 0) {
          items.push({
            category: 'conAlcohol',
            name: `Imperial unidad x${state.conAlcohol.cerveza.unidad}`,
            qty: state.conAlcohol.cerveza.unidad,
            unitPrice: CATALOG.cervezas.imperialUnidad.precio,
            total: CATALOG.cervezas.imperialUnidad.precio * state.conAlcohol.cerveza.unidad
          });
        }
        if (state.conAlcohol.cerveza.sixpack > 0) {
          items.push({
            category: 'conAlcohol',
            name: `Imperial Six Pack x${state.conAlcohol.cerveza.sixpack}`,
            qty: state.conAlcohol.cerveza.sixpack,
            unitPrice: CATALOG.cervezas.imperialSix.precio,
            total: CATALOG.cervezas.imperialSix.precio * state.conAlcohol.cerveza.sixpack
          });
        }
      }
      if (state.conAlcohol.vino.incluir && state.conAlcohol.vino.tipo && state.conAlcohol.vino.cantidad > 0) {
        const v = CATALOG.vinos[state.conAlcohol.vino.tipo];
        items.push({
          category: 'conAlcohol',
          name: `${v.name} x${state.conAlcohol.vino.cantidad}`,
          qty: state.conAlcohol.vino.cantidad,
          unitPrice: v.precio,
          total: v.precio * state.conAlcohol.vino.cantidad
        });
      }
    }

    // POSTRES
    if (state.postre.incluir) {
      Object.entries(state.postre.items).forEach(([key, qty]) => {
        if (qty > 0) {
          const item = CATALOG.postres[key];
          items.push({
            category: 'postre',
            name: `${item.name} x${qty}`,
            qty: qty,
            unitPrice: item.precio,
            total: item.precio * qty
          });
        }
      });
    }

    return items;
  }

  function calcularTotal() {
    return calcularItems().reduce((sum, i) => sum + i.total, 0);
  }

  // ============================================================
  // PROGRESS BAR
  // ============================================================
  function renderProgress() {
    const el = document.getElementById('progress');
    el.innerHTML = '';
    STEPS.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'progress-dot';
      if (i < currentStep) dot.classList.add('done');
      if (i === currentStep) dot.classList.add('active');
      el.appendChild(dot);
    });
  }

  // ============================================================
  // RENDER STEPS
  // ============================================================
  function render() {
    renderProgress();
    const c = document.getElementById('step-container');
    c.innerHTML = '';
    const stepName = STEPS[currentStep];

    if (stepName === 'equipo')       c.appendChild(renderEquipo());
    else if (stepName === 'picada')  c.appendChild(renderPicada());
    else if (stepName === 'carne')   c.appendChild(renderCarne());
    else if (stepName === 'burger')  c.appendChild(renderBurger());
    else if (stepName === 'sinAlcohol') c.appendChild(renderSinAlcohol());
    else if (stepName === 'conAlcohol') c.appendChild(renderConAlcohol());
    else if (stepName === 'postre')  c.appendChild(renderPostre());
    else if (stepName === 'resumen') c.appendChild(renderResumen());

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

          <div style="margin-top:10px;">
            <div class="options-list">
              ${Object.entries(CATALOG.vinos).map(([key, v]) => `
                <div class="option ${state.conAlcohol.vino.tipo === key ? 'selected' : ''}" onclick="selectVinoTipo('${key}')">
                  <div class="option-text">
                    <div class="option-name">${v.name}</div>
                  </div>
                  <div class="option-price">${fmtPrice(v.precio)}</div>
                </div>
              `).join('')}
            </div>
            ${state.conAlcohol.vino.tipo ? `
              <div class="option" style="margin-top:10px;">
                <div class="option-text">
                  <div class="option-name">Cantidad de botellas</div>
                </div>
                <div class="option-counter">
                  <button onclick="adjustVinoCantidad(-1)">−</button>
                  <span class="val">${state.conAlcohol.vino.cantidad}</span>
                  <button onclick="adjustVinoCantidad(1)">+</button>
                </div>
              </div>
            ` : ''}
          </div>
        `;
      }

      optsHTML = `
        <div class="sub-section">
          <div class="sub-label">¿Cerveza?</div>
          <div class="yesno">
            <button class="yesno-btn ${state.conAlcohol.cerveza.incluir === true ? 'selected' : ''}" onclick="toggleCerveza(true)">Sí</button>
            <button class="yesno-btn no ${state.conAlcohol.cerveza.incluir === false ? 'selected' : ''}" onclick="toggleCerveza(false)">No</button>
          </div>
          ${cervezaDetalle}
        </div>

        <div class="sub-section">
          <div class="sub-label">¿Vino?</div>
          <div class="yesno">
            <button class="yesno-btn ${state.conAlcohol.vino.incluir === true ? 'selected' : ''}" onclick="toggleVino(true)">Sí</button>
            <button class="yesno-btn no ${state.conAlcohol.vino.incluir === false ? 'selected' : ''}" onclick="toggleVino(false)">No</button>
          </div>
          ${vinoDetalle}
        </div>
      `;
    }

    card.innerHTML = `
      <div class="step-num">Paso 6 de 7</div>
      <h2 class="step-title">Bebidas <span class="italic">con alcohol</span></h2>
      <p class="step-desc">Para los grandes del equipo.</p>

      <div class="yesno">
        <button class="yesno-btn ${state.conAlcohol.incluir === true ? 'selected' : ''}" onclick="setConAlcoholIncluir(true)">Sí, sumá</button>
        <button class="yesno-btn no ${state.conAlcohol.incluir === false ? 'selected' : ''}" onclick="setConAlcoholIncluir(false)">No, gracias</button>
      </div>

      ${optsHTML}

      <div class="nav">
        <button class="btn btn-secondary" onclick="prev()">← Atrás</button>
        <button class="btn btn-primary" ${state.conAlcohol.incluir === null ? 'disabled' : ''} onclick="next()">Siguiente →</button>
      </div>
    `;
    return card;
  }

  // ---------- STEP 6: POSTRE ----------
  function renderPostre() {
    const card = document.createElement('div');
    card.className = 'card';

    let optsHTML = '';
    if (state.postre.incluir) {
      optsHTML = `
        <div class="sub-section">
          <div class="sub-label">Elegí tus postres</div>
          <div class="options-list">
            ${Object.entries(CATALOG.postres).map(([key, p]) => {
              const qty = state.postre.items[key] || 0;
              return `
                <div class="option ${qty > 0 ? 'selected' : ''}">
                  <div class="option-text">
                    <div class="option-name">${p.name}</div>
                    <div class="option-detail">${fmtPrice(p.precio)} c/u</div>
                  </div>
                  <div class="option-counter">
                    <button onclick="adjustBebida('postre','${key}',-1)">−</button>
                    <span class="val">${qty}</span>
                    <button onclick="adjustBebida('postre','${key}',1)">+</button>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="note-tip"><strong>Tip:</strong> 1 postre por persona, así nadie se queda sin festejar.</div>
        </div>
      `;
    }

    card.innerHTML = `
      <div class="step-num">Paso 7 de 7</div>
      <h2 class="step-title">El <span class="italic">cierre</span></h2>
      <p class="step-desc">Postres para coronar el partido.</p>

      <div class="yesno">
        <button class="yesno-btn ${state.postre.incluir === true ? 'selected' : ''}" onclick="setPostreIncluir(true)">Sí, sumá</button>
        <button class="yesno-btn no ${state.postre.incluir === false ? 'selected' : ''}" onclick="setPostreIncluir(false)">No, gracias</button>
      </div>

      ${optsHTML}

      <div class="nav">
        <button class="btn btn-secondary" onclick="prev()">← Atrás</button>
        <button class="btn btn-primary" ${state.postre.incluir === null ? 'disabled' : ''} onclick="next()">Ver mi pedido →</button>
      </div>
    `;
    return card;
  }

  // ---------- STEP 7: RESUMEN ----------
  function renderResumen() {
    const card = document.createElement('div');
    card.className = 'card';
    const items = calcularItems();
    const total = calcularTotal();

    // Agrupar por categoría
    const grupos = {
      picada:     { titulo: '🥖 Picada',         step: 1, items: [] },
      carne:      { titulo: '🥩 Asado',          step: 2, items: [] },
      burger:     { titulo: '🍔 Burgers',        step: 3, items: [] },
      sinAlcohol: { titulo: '🥤 Sin alcohol',    step: 4, items: [] },
      conAlcohol: { titulo: '🍷 Con alcohol',    step: 5, items: [] },
      postre:     { titulo: '🍰 Postres',        step: 6, items: [] }
    };

    items.forEach(i => grupos[i.category].items.push(i));

    let summaryHTML = '';
    Object.entries(grupos).forEach(([key, g]) => {
      if (g.items.length === 0) return;
      summaryHTML += `
        <div class="summary-section">
          <div class="summary-header">
            <div class="summary-title">${g.titulo}</div>
            <button class="summary-edit" onclick="goToStep(${g.step})">Editar</button>
          </div>
          ${g.items.map(i => `
            <div class="summary-item">
              <span class="name">${i.name}</span>
              <span class="price">${fmtPrice(i.total)}</span>
            </div>
            ${i.note ? `<div style="font-size:11px;color:var(--gris);margin-top:-2px;margin-bottom:4px;font-style:italic;">${i.note}</div>` : ''}
          `).join('')}
        </div>
      `;
    });

    if (items.length === 0) {
      summaryHTML = '<div class="summary-empty">No agregaste productos a tu pedido. Volvé a los pasos anteriores para sumar algo.</div>';
    }

    card.innerHTML = `
      <div class="step-num">Final · Tu pedido</div>
      <h2 class="step-title">Listo, <span class="italic">DT</span></h2>
      <p class="step-desc">Este es tu equipo titular. Revisalo y mandalo directo a La Fondiatta.</p>

      <div class="summary-section" style="margin-bottom:24px;">
        <div class="summary-title" style="margin-bottom:8px;">👥 Equipo</div>
        <div class="summary-item"><span class="name">${state.hombres} hombres · ${state.mujeres} mujeres · ${state.ninos} niños</span></div>
      </div>

      ${summaryHTML}

      ${items.length > 0 ? `
        <div class="summary-total">
          <div class="label">Total estimado</div>
          <div class="amount">${fmtPrice(total)}</div>
        </div>
        <div class="note-tip" style="margin-top:14px;">
          <strong>Importante:</strong> Estos son precios orientativos del menú Mayo 2026. El envío se cotiza aparte según tu zona y el pedido final lo confirmamos por WhatsApp.
        </div>
      ` : ''}

      <div class="nav" style="flex-direction:column;">
        <button class="btn btn-whatsapp" ${items.length === 0 ? 'disabled' : ''} onclick="enviarWhatsapp()">
          📲 Hacer mi pedido por WhatsApp
        </button>
        <div style="display:flex;gap:12px;margin-top:12px;">
          <button class="btn btn-secondary" style="flex:1;" onclick="prev()">← Atrás</button>
          <button class="btn btn-secondary" style="flex:1;" onclick="reiniciar()">🔄 Empezar de nuevo</button>
        </div>
      </div>
    `;
    return card;
  }

  // ============================================================
  // ACCIONES
  // ============================================================
  function adjust(key, delta) {
    state[key] = Math.max(0, state[key] + delta);
    render();
  }

  function next() { if (currentStep < STEPS.length - 1) { currentStep++; render(); } }
  function prev() { if (currentStep > 0) { currentStep--; render(); } }
  function goToStep(idx) { currentStep = idx; render(); }

  // Picada
  function setPicadaIncluir(v) {
    state.picada.incluir = v;
    if (!v) { state.picada.tipo = null; state.picada.tamano = null; }
    render();
  }
  function selectPicadaTipo(key) {
    state.picada.tipo = key;
    // Si la nueva picada no tiene el tamaño actual, resetear
    const p = CATALOG.picadas[key];
    if (state.picada.tamano && !p[state.picada.tamano]) state.picada.tamano = null;
    // Si solo tiene M, autoseleccionar
    if (!p.S && p.M) state.picada.tamano = 'M';
    render();
  }
  function selectPicadaTamano(t) { state.picada.tamano = t; render(); }

  // Carne
  function setCarneIncluir(v) {
    state.carne.incluir = v;
    if (!v) { state.carne.tipo = null; state.carne.carbon = false; }
    render();
  }
  function selectCarneTipo(key) { state.carne.tipo = key; render(); }
  function setCarbon(v) { state.carne.carbon = v; render(); }

  // Burger
  function setBurgerIncluir(v) {
    state.burger.incluir = v;
    if (!v) state.burger.tipo = null;
    render();
  }
  function selectBurgerTipo(key) { state.burger.tipo = key; render(); }

  // Sin alcohol
  function setSinAlcoholIncluir(v) {
    state.sinAlcohol.incluir = v;
    if (!v) state.sinAlcohol.items = {};
    render();
  }
  function adjustBebida(cat, key, delta) {
    if (!state[cat].items[key]) state[cat].items[key] = 0;
    state[cat].items[key] = Math.max(0, state[cat].items[key] + delta);
    if (state[cat].items[key] === 0) delete state[cat].items[key];
    render();
  }

  // Con alcohol
  function setConAlcoholIncluir(v) {
    state.conAlcohol.incluir = v;
    if (!v) {
      state.conAlcohol.cerveza = { incluir: false, unidad: 0, sixpack: 0 };
      state.conAlcohol.vino = { incluir: false, tipo: null, cantidad: 0 };
    }
    render();
  }
  function toggleCerveza(v) {
    state.conAlcohol.cerveza.incluir = v;
    if (!v) { state.conAlcohol.cerveza.unidad = 0; state.conAlcohol.cerveza.sixpack = 0; }
    render();
  }
  function adjustCerveza(tipo, delta) {
    state.conAlcohol.cerveza[tipo] = Math.max(0, state.conAlcohol.cerveza[tipo] + delta);
    render();
  }
  function toggleVino(v) {
    state.conAlcohol.vino.incluir = v;
    if (!v) { state.conAlcohol.vino.tipo = null; state.conAlcohol.vino.cantidad = 0; }
    render();
  }
  function selectVinoTipo(key) {
    state.conAlcohol.vino.tipo = key;
    if (state.conAlcohol.vino.cantidad === 0) state.conAlcohol.vino.cantidad = 1;
    render();
  }
  function adjustVinoCantidad(delta) {
    state.conAlcohol.vino.cantidad = Math.max(0, state.conAlcohol.vino.cantidad + delta);
    render();
  }

  // Postre
  function setPostreIncluir(v) {
    state.postre.incluir = v;
    if (!v) state.postre.items = {};
    render();
  }

  // ============================================================
  // WHATSAPP
  // ============================================================
  function enviarWhatsapp() {
    const items = calcularItems();
    const total = calcularTotal();

    let msg = `🏆 *MI PEDIDO LA FONDIATTA* 🏆\n`;
    msg += `_Armado desde "Armá tu Equipo"_\n\n`;
    msg += `👥 *Equipo:*\n`;
    msg += `${state.hombres} hombres · ${state.mujeres} mujeres · ${state.ninos} niños\n`;
    msg += `Total: ${totalPersonasReal()} personas\n\n`;
    msg += `📋 *Mi pedido:*\n`;

    const grupos = {
      picada:     '🥖 PICADA',
      carne:      '🥩 ASADO',
      burger:     '🍔 BURGERS',
      sinAlcohol: '🥤 BEBIDAS SIN ALCOHOL',
      conAlcohol: '🍷 BEBIDAS CON ALCOHOL',
      postre:     '🍰 POSTRES'
    };

    Object.entries(grupos).forEach(([cat, titulo]) => {
      const itemsCat = items.filter(i => i.category === cat);
      if (itemsCat.length > 0) {
        msg += `\n*${titulo}*\n`;
        itemsCat.forEach(i => {
          msg += `• ${i.name} — ${fmtPrice(i.total)}\n`;
        });
      }
    });

    msg += `\n💰 *TOTAL ESTIMADO: ${fmtPrice(total)}*\n`;
    msg += `_(Precios orientativos - sin envío)_\n\n`;
    msg += `¡Quedo a la espera de la confirmación final! 🇦🇷⚽`;

    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  }

  // ============================================================
  // RESET
  // ============================================================
  function reiniciar() {
    if (!confirm('¿Seguro querés empezar de nuevo? Se va a borrar todo lo que armaste.')) return;
    state = {
      hombres: 0, mujeres: 0, ninos: 0,
      picada: { incluir: null, tipo: null, tamano: null },
      carne:  { incluir: null, tipo: null, carbon: false },
      burger: { incluir: null, tipo: null },
      sinAlcohol: { incluir: null, items: {} },
      conAlcohol: { incluir: null, cerveza: { incluir: false, unidad: 0, sixpack: 0 }, vino: { incluir: false, tipo: null, cantidad: 0 } },
      postre: { incluir: null, items: {} }
    };
    currentStep = 0;
    render();
  }

  // ============================================================
  // INIT
  // ============================================================
  render();
</script>

</body>
</html>
